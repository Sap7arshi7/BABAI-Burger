<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Babai Burger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                🍔 Babai <span>Burger</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
            <div class="cart-icon">
                <a href="cart.html"><i class="fas fa-shopping-cart"></i> <span class="cart-count">0</span></a>
            </div>
        </nav>
    </header>

    <div class="cart-container">
        <h1 class="section-title">🛒 Your Cart</h1>
        
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cartBody">
                <tr><td colspan="5" class="empty-cart">Loading...</td></tr>
            </tbody>
        </table>
        
        <div class="cart-summary">
            <div class="total">Total: $<span id="cartTotal">0.00</span></div>
            <a href="checkout.html" id="checkoutBtn" class="btn btn-green">💚 Proceed to bKash Checkout</a>
            <a href="menu.html" class="btn" style="margin-left: 1rem;">Continue Shopping</a>
        </div>
    </div>

    <footer class="footer">
        <p>🍔 Babai Burger - Best Burgers in Town</p>
        <p>💚 Pay with bKash - Fast & Secure</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
