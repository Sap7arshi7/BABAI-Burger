<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bKash Payment - Babai Burger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                🍔 Babai <span>Burger</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
            <div class="cart-icon">
                <a href="cart.html"><i class="fas fa-shopping-cart"></i> <span class="cart-count">0</span></a>
            </div>
        </nav>
    </header>

    <div class="checkout-container">
        <div class="bkash-card">
            <div class="bkash-header">
                <i class="fas fa-mobile-alt"></i>
                <h2>💚 bKash Payment</h2>
                <p>Pay securely with bKash - Babai Burger</p>
            </div>
            
            <div class="amount-box">
                <h3>Total Amount: $<span id="amount">0.00</span> USD</h3>
                <h3 style="color: #2ecc71;">≈ ৳<span id="bdtAmount">0</span> BDT</h3>
            </div>
            
            <div class="demo-info">
                <i class="fas fa-info-circle"></i> Demo Payment Info:<br>
                <strong>bKash Number:</strong> 01712345678<br>
                <strong>PIN:</strong> 1234
            </div>
            
            <form id="bkashForm">
                <div class="form-group">
                    <label>📱 bKash Mobile Number</label>
                    <input type="tel" id="bkashNumber" placeholder="01XXXXXXXXX" maxlength="11">
                </div>
                
                <div class="form-group">
                    <label>🔐 bKash PIN (4 digits)</label>
                    <input type="password" id="bkashPin" placeholder="****" maxlength="4">
                </div>
                
                <input type="hidden" id="totalAmount">
                
                <button type="submit" class="btn pay-btn">
                    <i class="fas fa-check"></i> Pay with bKash
                </button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>🍔 Babai Burger - Best Burgers in Town</p>
        <p>💚 bKash Payment Demo - For Portfolio Only</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
